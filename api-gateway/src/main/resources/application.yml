server:
  port: 8080
spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: identity-service
          uri: lb://identity-service
          predicates:
            - Path=/identity/**
          filters:
            - StripPrefix=1
        - id: course-service
          uri: lb://course-service
          predicates:
            - Path=/course/**
          filters:
            - StripPrefix=1
        - id: enrollment-service
          uri: lb://enrollment-service
          predicates:
            - Path=/enrollment/**
          filters:
            - StripPrefix=1
        - id: assessment-service
          uri: lb://assessment-service
          predicates:
            - Path=/assessment/**
          filters:
            - StripPrefix=1
        - id: competency-service
          uri: lb://competency-service
          predicates:
            - Path=/competency/**
          filters:
            - StripPrefix=1
        - id: compliance-service
          uri: lb://compliance-service
          predicates:
            - Path=/compliance/**
          filters:
            - StripPrefix=1
        - id: reporting-service
          uri: lb://reporting-service
          predicates:
            - Path=/reporting/**
          filters:
            - StripPrefix=1
        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/notification/**
          filters:
            - StripPrefix=1
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
skillforge:
  jwt:
    secret: skillforge-enterprise-jwt-secret-key-minimum-256-bits-required-for-hs256-algorithm-safety
