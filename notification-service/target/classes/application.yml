server:
  port: 8008
spring:
  application:
    name: notification-service
  datasource:
    url: jdbc:mysql://localhost:3306/skillforge_notification?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: root
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
    hostname: localhost
skillforge:
  jwt:
    secret: skillforge-enterprise-jwt-secret-key-minimum-256-bits-required-for-hs256-algorithm-safety
