server:
  port: 8002
spring:
  application:
    name: course-service
  datasource:
    url: jdbc:mysql://localhost:3306/skillforge_course?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: root
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    instance:
      # --- ADDED THIS SECTION ---
      prefer-ip-address: true
      instance-id: ${spring.cloud.client.ip-address}:${server.port}
skillforge:
  jwt:
    secret: skillforge-enterprise-jwt-secret-key-minimum-256-bits-required-for-hs256-algorithm-safety
